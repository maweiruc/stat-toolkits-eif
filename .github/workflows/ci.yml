name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Validate registry through script
        run: python scripts/validate_formula_registry.py --strict

      - name: Validate registry through package module
        run: python -m eif_toolkit.registry_validation --strict

      - name: Run unit tests
        run: python -m unittest discover -s tests
